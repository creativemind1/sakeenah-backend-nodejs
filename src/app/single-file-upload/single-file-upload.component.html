<input id="cin" name="cin" type="file" (change)="fileChangeEvent($event)" placeholder="Upload a file..." />
<button type="button" class="btn btn-success btn-s" (click)="upload()">
    <i class="glyphicon glyphicon-open-file"></i>&nbsp;Upload
</button>

<mat-nav-list >
    <mat-list-item>
        <h3 matLine> {{imgUrl.value}} </h3>
        <button mat-icon-button (click)='onSigleDelete(imgUrl)'>
            <mat-icon>delete</mat-icon>
        </button>
    </mat-list-item>
</mat-nav-list>
